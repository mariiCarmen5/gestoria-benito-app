<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestoría Benito</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --crimson: #9D1336;
      --crimson-dark: #7a0f2a;
      --crimson-light: #c4193f;
      --text-dark: #1a1a1a;
      --text-mid: #555;
      --text-light: #999;
      --bg: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Mobile-first phone shell */
    .phone-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      padding: 20px;
    }

    .phone {
      width: 375px;
      height: 812px;
      background: #fff;
      border-radius: 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Status bar */
    .status-bar {
      height: 44px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .status-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.02em;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-icons svg {
      fill: var(--text-dark);
    }

    /* Main content */
    .app-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 32px 0;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background accent */
    .app-content::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(157,19,54,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Logo */
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.8s ease both;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
    }

    .logo-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 400;
      color: var(--crimson);
      letter-spacing: -0.01em;
      line-height: 1;
      text-align: center;
    }

    /* CTA Button */
    .cta-section {
      width: 100%;
      margin-top: 52px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .btn-venia {
      display: block;
      width: 100%;
      padding: 20px 32px;
      background: var(--crimson);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 24px rgba(157,19,54,0.3);
    }

    .btn-venia:hover {
      background: var(--crimson-dark);
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(157,19,54,0.38);
    }

    .btn-venia:active {
      transform: translateY(1px);
      box-shadow: 0 4px 14px rgba(157,19,54,0.25);
    }

    /* Spacer */
    .spacer { flex: 1; }

    /* Footer links */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 12px 0 8px;
      animation: fadeUp 0.8s 0.35s ease both;
    }

    .footer-links a {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-mid);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--crimson); }

    /* Bottom navigation */
    .bottom-nav {
      height: 72px;
      background: #fff;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 10px;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      cursor: pointer;
      flex: 1;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    .nav-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-item.active svg { fill: var(--crimson); stroke: var(--crimson); }
    .nav-item.active .nav-label { color: var(--crimson); }
    .nav-item:not(.active) svg { fill: #999; stroke: #999; }
    .nav-item:not(.active) .nav-label { color: #999; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Full-screen on mobile */
    @media (max-width: 430px) {
      .phone-wrap {
        background: #fff;
        padding: 0;
        align-items: stretch;
      }
      .phone {
        width: 100%;
        height: 100%;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>

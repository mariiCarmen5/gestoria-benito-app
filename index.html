<script>
async function enviarConsulta() {
    const input = document.getElementById('ia-input');
    const chatBox = document.getElementById('ia-chat-box');
    const texto = input.value.trim();
    
    if (!texto) return;

    // 1. Mostrar mensaje del usuario en pantalla
    chatBox.innerHTML += `<div style="margin-bottom:15px; text-align:right;">
        <span style="background:var(--crimson); color:white; padding:8px 12px; border-radius:12px; display:inline-block;">${texto}</span>
    </div>`;
    input.value = '';

    // 2. Configurar la llamada a Gemini
    const apiKey = localStorage.getItem('gemini_api_key'); // La pedirá la primera vez
    if (!apiKey) {
        const key = prompt("Por favor, introduce tu API Key de Gemini para empezar:");
        if (key) localStorage.setItem('gemini_api_key', key);
        else return;
    }

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    // 3. Instrucciones para que actúe como tu Gestoría
    const contextoSistema = "Eres el asistente inteligente de Gestoría Benito. Solo respondes dudas sobre los documentos proporcionados, el BOE o normativa española. Si no sabes algo, pide que contacten con María del Carmen Benito. Sé profesional y breve.";

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: texto }] }],
                systemInstruction: { parts: [{ text: contextoSistema }] }
            })
        });

        const data = await response.json();
        const respuestaIA = data.candidates[0].content.parts[0].text;

        // 4. Mostrar respuesta de la IA
        chatBox.innerHTML += `<div style="margin-bottom:15px; text-align:left;">
            <span style="background:#eee; color:black; padding:8px 12px; border-radius:12px; display:inline-block;">${respuestaIA}</span>
        </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        alert("Error al conectar con la IA. Revisa tu API Key.");
    }
}
</script>
